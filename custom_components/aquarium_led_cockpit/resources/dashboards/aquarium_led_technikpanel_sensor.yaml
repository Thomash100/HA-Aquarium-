type: vertical-stack
cards:
  - type: custom:button-card
    entity: sensor.aquarium_led_cockpit_status
    show_name: false
    show_state: false
    show_icon: false
    tap_action:
      action: more-info
    hold_action:
      action: more-info
    styles:
      card:
        - padding: 18px 20px
        - border-radius: 20px
        - border: 1px solid rgba(140, 227, 255, 0.22)
        - background: linear-gradient(135deg, rgba(5,18,28,0.95), rgba(9,37,55,0.88))
        - box-shadow: 0 18px 36px rgba(0,0,0,0.28)
      grid:
        - grid-template-areas: '"panel"'
        - grid-template-columns: 1fr
      custom_fields:
        panel:
          - justify-self: stretch
          - align-self: stretch
    custom_fields:
      panel: |
        [[[
          const raw = entity?.state || '';
          const data = entity?.attributes || {};
          const safe = (v, fallback = '-') => (v === undefined || v === null || v === '') ? fallback : v;
          const phaseLabel = {
            sunrise: 'SUNRISE RAMP',
            day: 'DAYLIGHT RUN',
            sunset: 'SUNSET RAMP',
            night: 'NIGHT MODE'
          }[(data.phase || raw)] || String(safe(data.phase || raw)).toUpperCase();
          const accent = {
            sunrise: '#ffd08a',
            day: '#89ebff',
            sunset: '#ff9f7d',
            night: '#9bb4ff'
          }[(data.phase || raw)] || '#89ebff';
          return `
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;">
              <div>
                <div style="font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(220,245,255,0.72);font-family:Consolas, 'Courier New', monospace;">Aquarium Technikpanel</div>
                <div style="margin-top:6px;font-size:30px;font-weight:800;letter-spacing:0.04em;color:${accent};font-family:Consolas, 'Courier New', monospace;">${phaseLabel}</div>
                <div style="margin-top:8px;font-size:13px;color:rgba(235,248,255,0.84);">Letztes Update: ${safe(data.updated)}</div>
              </div>
              <div style="display:grid;grid-template-columns:repeat(3, minmax(88px, 1fr));gap:10px;min-width:min(100%, 340px);">
                <div style="padding:10px 12px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);">
                  <div style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.68;">Zeit</div>
                  <div style="margin-top:4px;font-size:22px;font-weight:800;">${safe(data.time)}</div>
                </div>
                <div style="padding:10px 12px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);">
                  <div style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.68;">Ziel</div>
                  <div style="margin-top:4px;font-size:22px;font-weight:800;">${safe(data.target_pct, 0)}%</div>
                </div>
                <div style="padding:10px 12px;border-radius:14px;background:${(data.cheap === true || String(data.cheap).toLowerCase() === 'true') ? 'rgba(86, 214, 159, 0.20)' : 'rgba(255,255,255,0.08)'};border:1px solid rgba(255,255,255,0.08);">
                  <div style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.68;">Phase</div>
                  <div style="margin-top:4px;font-size:16px;font-weight:800;">${(data.cheap === true || String(data.cheap).toLowerCase() === 'true') ? 'GUENSTIG' : 'NORMAL'}</div>
                </div>
              </div>
            </div>`;
        ]]]

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.aquarium_led_cockpit_status
        show_name: false
        show_state: false
        show_icon: false
        styles:
          card:
            - padding: 16px
            - border-radius: 20px
            - border: 1px solid rgba(255,255,255,0.10)
            - background: linear-gradient(180deg, rgba(18,24,33,0.96), rgba(11,16,22,0.96))
          grid:
            - grid-template-areas: '"body"'
            - grid-template-columns: 1fr
          custom_fields:
            body:
              - justify-self: stretch
              - align-self: stretch
        custom_fields:
          body: |
            [[[
              const raw = entity?.state || '';
          const data = entity?.attributes || {};
              const safe = (v, fallback = '-') => (v === undefined || v === null || v === '') ? fallback : v;
              const num = (v, fallback = 0) => Number.isFinite(Number(v)) ? Number(v) : fallback;
              const clamp = (v) => Math.max(0, Math.min(100, v));
              const priceFactor = clamp(num(data.price_factor) * 100);
              const cheap = data.cheap === true || String(data.cheap).toLowerCase() === 'true';
              return `
                <div style="font-family:Consolas, 'Courier New', monospace;">
                  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                    <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#ffd88b;">Preismodul</div>
                    <ha-icon icon="mdi:cash-multiple" style="width:18px;height:18px;color:#ffd88b;"></ha-icon>
                  </div>
                  <div style="margin-top:14px;display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:10px;">
                    <div style="padding:10px;border-radius:14px;background:rgba(255,255,255,0.06);">
                      <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Quelle</div>
                      <div style="margin-top:4px;font-size:18px;font-weight:800;">${safe(data.price_source)}</div>
                    </div>
                    <div style="padding:10px;border-radius:14px;background:${cheap ? 'rgba(86,214,159,0.18)' : 'rgba(255,255,255,0.06)'};">
                      <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Billigphase</div>
                      <div style="margin-top:4px;font-size:18px;font-weight:800;">${cheap ? 'AKTIV' : 'AUS'}</div>
                    </div>
                  </div>
                  <div style="margin-top:12px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Aktuell</span><span style="font-weight:700;">${safe(data.price)}</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Minimum</span><span style="font-weight:700;">${safe(data.price_min)}</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Maximum</span><span style="font-weight:700;">${safe(data.price_max)}</span></div>
                  <div style="margin-top:12px;">
                    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;"><span style="opacity:0.7;">Preisfaktor</span><span style="font-weight:700;">${Math.round(priceFactor)}%</span></div>
                    <div style="height:10px;border-radius:999px;background:rgba(255,255,255,0.10);overflow:hidden;">
                      <div style="height:100%;width:${priceFactor}%;background:linear-gradient(90deg, #7dffcd, #ffd46b);"></div>
                    </div>
                  </div>
                </div>`;
            ]]]

      - type: custom:button-card
        entity: sensor.aquarium_led_cockpit_status
        show_name: false
        show_state: false
        show_icon: false
        styles:
          card:
            - padding: 16px
            - border-radius: 20px
            - border: 1px solid rgba(255,255,255,0.10)
            - background: linear-gradient(180deg, rgba(15,30,39,0.96), rgba(9,18,25,0.96))
          grid:
            - grid-template-areas: '"body"'
            - grid-template-columns: 1fr
          custom_fields:
            body:
              - justify-self: stretch
              - align-self: stretch
        custom_fields:
          body: |
            [[[
              const raw = entity?.state || '';
          const data = entity?.attributes || {};
              const safe = (v, fallback = '-') => (v === undefined || v === null || v === '') ? fallback : v;
              const num = (v, fallback = 0) => Number.isFinite(Number(v)) ? Number(v) : fallback;
              const clamp = (v) => Math.max(0, Math.min(100, v));
              const weatherFactor = clamp(num(data.weather_factor) * 100);
              const cloudFactor = clamp(num(data.cloud_factor) * 100);
              return `
                <div style="font-family:Consolas, 'Courier New', monospace;">
                  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                    <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#9de8ff;">Wettermodul</div>
                    <ha-icon icon="mdi:weather-partly-cloudy" style="width:18px;height:18px;color:#9de8ff;"></ha-icon>
                  </div>
                  <div style="margin-top:14px;padding:12px;border-radius:14px;background:rgba(255,255,255,0.06);">
                    <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Wetterstatus</div>
                    <div style="margin-top:4px;font-size:20px;font-weight:800;">${safe(data.weather)}</div>
                  </div>
                  <div style="margin-top:12px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Bewoelkung</span><span style="font-weight:700;">${safe(data.cloudiness_pct, 0)}%</span></div>
                  <div style="margin-top:12px;">
                    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;"><span style="opacity:0.7;">Wetterfaktor</span><span style="font-weight:700;">${Math.round(weatherFactor)}%</span></div>
                    <div style="height:10px;border-radius:999px;background:rgba(255,255,255,0.10);overflow:hidden;">
                      <div style="height:100%;width:${weatherFactor}%;background:linear-gradient(90deg, #8be9ff, #56d6bc);"></div>
                    </div>
                  </div>
                  <div style="margin-top:12px;">
                    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;"><span style="opacity:0.7;">Wolkenfaktor</span><span style="font-weight:700;">${Math.round(cloudFactor)}%</span></div>
                    <div style="height:10px;border-radius:999px;background:rgba(255,255,255,0.10);overflow:hidden;">
                      <div style="height:100%;width:${cloudFactor}%;background:linear-gradient(90deg, #dfe9ff, #84b6ff);"></div>
                    </div>
                  </div>
                </div>`;
            ]]]

      - type: custom:button-card
        entity: sensor.aquarium_led_cockpit_status
        show_name: false
        show_state: false
        show_icon: false
        styles:
          card:
            - padding: 16px
            - border-radius: 20px
            - border: 1px solid rgba(255,255,255,0.10)
            - background: linear-gradient(180deg, rgba(20,20,28,0.96), rgba(11,12,16,0.96))
          grid:
            - grid-template-areas: '"body"'
            - grid-template-columns: 1fr
          custom_fields:
            body:
              - justify-self: stretch
              - align-self: stretch
        custom_fields:
          body: |
            [[[
              const raw = entity?.state || '';
          const data = entity?.attributes || {};
              const safe = (v, fallback = '-') => (v === undefined || v === null || v === '') ? fallback : v;
              const num = (v, fallback = 0) => Number.isFinite(Number(v)) ? Number(v) : fallback;
              const pct255 = (v) => Math.max(0, Math.min(100, (num(v, 0) / 255) * 100));
              const rgbw = Array.isArray(data.rgbw) ? data.rgbw : ['-', '-', '-', '-'];
              const makeBar = (label, value, color) => `
                <div style="margin-top:10px;">
                  <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="opacity:0.7;">${label}</span><span style="font-weight:700;">${Math.round(value)}%</span></div>
                  <div style="height:10px;border-radius:999px;background:rgba(255,255,255,0.10);overflow:hidden;">
                    <div style="height:100%;width:${value}%;background:${color};"></div>
                  </div>
                </div>`;
              return `
                <div style="font-family:Consolas, 'Courier New', monospace;">
                  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                    <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#f4f5ff;">Lichtmodul</div>
                    <ha-icon icon="mdi:led-strip-variant" style="width:18px;height:18px;color:#f4f5ff;"></ha-icon>
                  </div>
                  <div style="margin-top:14px;display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:10px;">
                    <div style="padding:10px;border-radius:14px;background:rgba(255,255,255,0.06);">
                      <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Ziel</div>
                      <div style="margin-top:4px;font-size:20px;font-weight:800;">${safe(data.target_pct, 0)}%</div>
                    </div>
                    <div style="padding:10px;border-radius:14px;background:rgba(255,255,255,0.06);">
                      <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Weiss</div>
                      <div style="margin-top:4px;font-size:20px;font-weight:800;">${safe(data.white_pct, 0)}%</div>
                    </div>
                  </div>
                  ${makeBar('Rot', pct255(rgbw[0]), 'linear-gradient(90deg, #ff9d9d, #ff4d4d)')}
                  ${makeBar('Gruen', pct255(rgbw[1]), 'linear-gradient(90deg, #b8ffcc, #45d56d)')}
                  ${makeBar('Blau', pct255(rgbw[2]), 'linear-gradient(90deg, #b8d0ff, #4e84ff)')}
                  ${makeBar('Weiss', pct255(rgbw[3]), 'linear-gradient(90deg, #ffffff, #ccd7ff)')}
                </div>`;
            ]]]

      - type: custom:button-card
        entity: sensor.aquarium_led_cockpit_status
        show_name: false
        show_state: false
        show_icon: false
        styles:
          card:
            - padding: 16px
            - border-radius: 20px
            - border: 1px solid rgba(255,255,255,0.10)
            - background: linear-gradient(180deg, rgba(24,23,17,0.96), rgba(14,13,9,0.96))
          grid:
            - grid-template-areas: '"body"'
            - grid-template-columns: 1fr
          custom_fields:
            body:
              - justify-self: stretch
              - align-self: stretch
        custom_fields:
          body: |
            [[[
              const raw = entity?.state || '';
          const data = entity?.attributes || {};
              const safe = (v, fallback = '-') => (v === undefined || v === null || v === '') ? fallback : v;
              return `
                <div style="font-family:Consolas, 'Courier New', monospace;">
                  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                    <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#ffe29a;">Zeitmodul</div>
                    <ha-icon icon="mdi:timer-cog-outline" style="width:18px;height:18px;color:#ffe29a;"></ha-icon>
                  </div>
                  <div style="margin-top:14px;padding:12px;border-radius:14px;background:rgba(255,255,255,0.06);">
                    <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Aktuelle Phase</div>
                    <div style="margin-top:4px;font-size:20px;font-weight:800;">${safe(data.phase)}</div>
                  </div>
                  <div style="margin-top:12px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Lokale Zeit</span><span style="font-weight:700;">${safe(data.time)}</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Sonnenaufgang</span><span style="font-weight:700;">${safe(data.sunrise)}</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Sonnenuntergang</span><span style="font-weight:700;">${safe(data.sunset)}</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Basishelligkeit</span><span style="font-weight:700;">${safe(data.base_pct, 0)}%</span></div>
                </div>`;
            ]]]

