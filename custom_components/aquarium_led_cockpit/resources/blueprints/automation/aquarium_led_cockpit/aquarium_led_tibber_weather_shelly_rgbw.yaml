blueprint:
  name: Aquarium LED mit Tibber, Wetter und Tagesphasen fuer Shelly RGBW steuern
  description: >
    Steuert Aquarium-LEDs ueber Home Assistant und Shelly-RGBW-Lichter anhand
    von Tageszeit, Tibber-Boersenstrompreis oder alternativen Preis-Entitaeten und aktuellem Wetter. Die
    Beleuchtung simuliert Sonnenaufgang, Tag, Sonnenuntergang und Nacht,
    dimmt bei hohen Strompreisen den Verbrauch herunter und erzeugt tagsueber
    eine einfache Wolkensimulation. Die Zeitbasis kann ueber einen editierbaren
    Zeitzonen-/Zeitversatz angepasst werden. Das Blueprint erwartet, dass die
    ausgewaehlten Farblicht-Entitaeten rgbw_color unterstuetzen oder den Wert
    sinnvoll umsetzen.
  domain: automation
  input:
    rgbw_lights:
      name: Shelly RGBW-Lichter
      description: Eine oder mehrere Farblicht-Entitaeten fuer das Aquarium.
      selector:
        entity:
          filter:
            - domain: light
          multiple: true
    white_lights:
      name: Optionale Weisskanaele
      description: >
        Optionale reine Weiss-Lichter oder Weisskanaele, die aus dem
        berechneten W-Anteil mit angesteuert werden.
      default: []
      selector:
        entity:
          filter:
            - domain: light
          multiple: true
    weather_entity:
      name: Wetter-Entitaet
      description: Wetter-Entitaet fuer die Wolkensimulation und Grunddaempfung.
      selector:
        entity:
          filter:
            - domain: weather
    sun_entity:
      name: Sonnen-Entitaet
      description: Normalerweise sun.sun fuer datumsabhaengigen Sonnenaufgang und Sonnenuntergang.
      default: sun.sun
      selector:
        entity:
          filter:
            - domain: sun
    tibber_price_entity:
      name: Tibber Preis-Entitaet optional
      description: >
        Optional waehlbarer Tibber-Preissensor. Wenn gesetzt und numerisch,
        wird dieser direkt fuer die Preissteuerung verwendet. Attribute wie
        min_price und max_price werden automatisch erkannt.
      default: ""
      selector:
        entity:
          filter:
            - domain: sensor
    price_entity_current:
      name: Andere Preis-Entitaet aktuell optional
      description: >
        Optional waehlbarer Sensor mit aktuellem Strompreis fuer andere Anbieter.
        Wird verwendet, wenn keine Tibber Preis-Entitaet gesetzt ist.
      default: ""
      selector:
        entity:
          filter:
            - domain: sensor
    price_entity_min:
      name: Preis-Entitaet guenstig optional
      description: >
        Optional waehlbarer Sensor mit guenstigem Referenzpreis, zum Beispiel
        Tagesminimum oder billigster bevorstehender Preis. Kann leer bleiben,
        wenn dein aktueller Preissensor min_price bereits als Attribut liefert.
      default: ""
      selector:
        entity:
          filter:
            - domain: sensor
    price_entity_max:
      name: Preis-Entitaet teuer optional
      description: >
        Optional waehlbarer Sensor mit teurem Referenzpreis, zum Beispiel
        Tagesmaximum oder teuerster bevorstehender Preis. Kann leer bleiben,
        wenn dein aktueller Preissensor max_price bereits als Attribut liefert.
      default: ""
      selector:
        entity:
          filter:
            - domain: sensor
    price_entity_cheap:
      name: Guenstig-Entitaet optional
      description: >
        Optional waehlbarer binary_sensor oder input_boolean. Wenn diese
        Entitaet on ist, wird der Bonus fuer billige Phasen direkt aktiviert.
      default: ""
      selector:
        entity:
          filter:
            - domain:
                - binary_sensor
                - input_boolean
    tibber_home_name:
      name: Tibber Home-Key optional nur Fallback
      description: >
        Nur noetig, wenn du keine Tibber Preis-Entitaet nutzt und tibber.get_prices
        ueber mehrere Homes aufgerufen wird. Sonst leer lassen.
      default: ""
      selector:
        text:
    maintenance_switch_entity:
      name: Wartungsschalter
      description: >
        Standardmaessig der exportierte Dashboard-Helfer fuer Wartungslicht. Wenn
        aktiv, schaltet die Automatisierung fuer kurze Arbeiten auf 100 Prozent Licht.
      default: input_boolean.aquarium_led_maintenance_mode
      selector:
        entity:
          filter:
            - domain: input_boolean
    maintenance_timeout_minutes:
      name: Wartungsdauer in Minuten
      description: Nach dieser Zeit wird der Wartungsschalter automatisch wieder ausgeschaltet.
      default: 30
      selector:
        number:
          min: 5
          max: 120
          step: 5
          unit_of_measurement: min
          mode: box
    day_brightness_control_entity:
      name: Regler Taghelligkeit optional
      description: Standardmaessig der exportierte Dashboard-Regler fuer die Taghelligkeit.
      default: input_number.aquarium_led_day_brightness_pct
      selector:
        entity:
          filter:
            - domain: input_number
    night_brightness_control_entity:
      name: Regler Nachtlicht optional
      description: Standardmaessig der exportierte Dashboard-Regler fuer das Nachtlicht.
      default: input_number.aquarium_led_night_brightness_pct
      selector:
        entity:
          filter:
            - domain: input_number
    price_dimming_strength_control_entity:
      name: Regler Preisdimmung optional
      description: Standardmaessig der exportierte Dashboard-Regler fuer die Preisdaempfung.
      default: input_number.aquarium_led_price_dimming_strength_pct
      selector:
        entity:
          filter:
            - domain: input_number
    cloud_simulation_strength_control_entity:
      name: Regler Wolkenstaerke optional
      description: Standardmaessig der exportierte Dashboard-Regler fuer die Wolkensimulation.
      default: input_number.aquarium_led_cloud_simulation_strength_pct
      selector:
        entity:
          filter:
            - domain: input_number
    price_lookahead_hours:
      name: Tibber-Vorausblick in Stunden
      description: So viele kommende Stunden werden fuer die Preisbewertung betrachtet.
      default: 24
      selector:
        number:
          min: 6
          max: 48
          step: 1
          unit_of_measurement: h
          mode: slider
    cheapest_hours_count:
      name: Anzahl billiger Stunden fuer Bonus
      description: >
        Liegt die aktuelle Stunde in diesem guenstigen Fenster, kann die
        Helligkeit leicht angehoben werden.
      default: 4
      selector:
        number:
          min: 1
          max: 24
          step: 1
          unit_of_measurement: h
          mode: slider
    price_dimming_strength_pct:
      name: Preisabhaengige Daempfung in Prozent
      description: >
        Wie stark hohe Strompreise die Tageshelligkeit reduzieren duerfen.
      default: 40
      selector:
        number:
          min: 0
          max: 90
          step: 1
          unit_of_measurement: "%"
          mode: slider
    cheap_hours_bonus_pct:
      name: Bonus in billigen Stunden in Prozent
      description: >
        Zusaetzliche Aufhellung, wenn die aktuelle Stunde zu den billigsten
        kommenden Stunden gehoert.
      default: 10
      selector:
        number:
          min: 0
          max: 40
          step: 1
          unit_of_measurement: "%"
          mode: slider
    minimum_price_factor_pct:
      name: Mindest-Helligkeit trotz hohem Preis in Prozent
      description: Unter diese Preisfaktor-Grenze wird tagsueber nicht gedimmt.
      default: 55
      selector:
        number:
          min: 10
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    timezone_offset_minutes:
      name: Globaler Tagesphasen-Versatz in Minuten
      description: >
        Verschiebt die automatisch aus der Sonnen-Entitaet berechneten Tagesphasen.
        Positive Werte spaeter, negative frueher.
      default: 0
      selector:
        number:
          min: -720
          max: 720
          step: 15
          unit_of_measurement: min
          mode: box
    sunrise_offset_minutes:
      name: Zusatz-Versatz Sonnenaufgang in Minuten
      description: >
        Verschiebt nur den Beginn des Sonnenaufgangs relativ zur berechneten
        Sonnenaufgangszeit.
      default: 0
      selector:
        number:
          min: -240
          max: 240
          step: 5
          unit_of_measurement: min
          mode: box


    sunrise_duration_minutes:
      name: Dauer Sonnenaufgang in Minuten
      default: 120
      selector:
        number:
          min: 5
          max: 360
          step: 5
          unit_of_measurement: min
          mode: slider
    sunset_offset_minutes:
      name: Zusatz-Versatz Sonnenuntergang in Minuten
      description: >
        Verschiebt nur den Beginn des Sonnenuntergangs relativ zur berechneten
        Sonnenuntergangszeit.
      default: 0
      selector:
        number:
          min: -240
          max: 240
          step: 5
          unit_of_measurement: min
          mode: box


    sunset_duration_minutes:
      name: Dauer Sonnenuntergang in Minuten
      default: 150
      selector:
        number:
          min: 5
          max: 360
          step: 5
          unit_of_measurement: min
          mode: slider
    day_brightness_pct:
      name: Basis-Helligkeit am Tag in Prozent
      default: 90
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    night_brightness_pct:
      name: Nacht-/Mondlicht-Helligkeit in Prozent
      description: 0 schaltet nachts ganz aus.
      default: 2
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: "%"
          mode: slider
    weather_dimming_strength_pct:
      name: Wetterbedingte Grunddaempfung in Prozent
      description: >
        Grundsaetzliche Daempfung bei hoher Bewoelkung oder schlechtem Wetter.
      default: 20
      selector:
        number:
          min: 0
          max: 60
          step: 1
          unit_of_measurement: "%"
          mode: slider
    cloud_simulation_strength_pct:
      name: Staerke der Wolkensimulation in Prozent
      description: >
        Bestimmt, wie stark wandernde Wolken die Helligkeit tagsueber zusaetzlich
        absenken.
      default: 45
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    minimum_weather_factor_pct:
      name: Mindest-Helligkeit trotz Wetter in Prozent
      description: Unter diese Wetter-Grenze wird tagsueber nicht gedimmt.
      default: 50
      selector:
        number:
          min: 10
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    transition_seconds:
      name: Uebergangszeit in Sekunden
      description: >
        Weiche Uebergaenge fuer Sonnenaufgang, Sonnenuntergang und Wolken.
      default: 240
      selector:
        number:
          min: 0
          max: 1800
          step: 5
          unit_of_measurement: s
          mode: box
    dawn_rgbw:
      name: RGBW-Farbe Morgendaemmerung
      description: Werte als R,G,B,W mit 0 bis 255.
      default: "255,140,60,30"
      selector:
        text:
    day_rgbw:
      name: RGBW-Farbe Tag
      description: Werte als R,G,B,W mit 0 bis 255.
      default: "120,180,255,220"
      selector:
        text:
    dusk_rgbw:
      name: RGBW-Farbe Abenddaemmerung
      description: Werte als R,G,B,W mit 0 bis 255.
      default: "255,90,30,12"
      selector:
        text:
    night_rgbw:
      name: RGBW-Farbe Nacht
      description: Werte als R,G,B,W mit 0 bis 255.
      default: "15,30,90,0"
      selector:
        text:
    status_text_entity:
      name: Optionale Dashboard-Status-Entitaet
      description: >
        Optionale input_text-Entitaet, in die die Automatisierung einen kompakten
        JSON-Status fuer das Dashboard schreibt.
      default: ""
      selector:
        text:
    debug_notification:
      name: Debug-Benachrichtigung
      description: >
        Erstellt oder aktualisiert eine persistente Benachrichtigung mit Phase,
        Preis-, Wetter- und Farbwerten.
      default: false
      selector:
        boolean:

mode: restart
max_exceeded: silent

triggers:
  - trigger: homeassistant
    event: start

  - trigger: time_pattern
    minutes: "/1"

  - trigger: state
    entity_id:
      - !input weather_entity
      - !input sun_entity

variables:
  rgbw_lights: !input rgbw_lights
  white_lights: !input white_lights
  weather_entity: !input weather_entity
  sun_entity: !input sun_entity
  tibber_price_entity: !input tibber_price_entity
  price_entity_current: !input price_entity_current
  price_entity_min: !input price_entity_min
  price_entity_max: !input price_entity_max
  price_entity_cheap: !input price_entity_cheap
  tibber_home_name: !input tibber_home_name
  maintenance_switch_entity: !input maintenance_switch_entity
  maintenance_timeout_minutes: !input maintenance_timeout_minutes
  day_brightness_control_entity: !input day_brightness_control_entity
  night_brightness_control_entity: !input night_brightness_control_entity
  price_dimming_strength_control_entity: !input price_dimming_strength_control_entity
  cloud_simulation_strength_control_entity: !input cloud_simulation_strength_control_entity
  price_lookahead_hours: !input price_lookahead_hours
  cheapest_hours_count: !input cheapest_hours_count
  price_dimming_strength_pct: !input price_dimming_strength_pct
  cheap_hours_bonus_pct: !input cheap_hours_bonus_pct
  minimum_price_factor_pct: !input minimum_price_factor_pct
  timezone_offset_minutes: !input timezone_offset_minutes
  sunrise_offset_minutes: !input sunrise_offset_minutes
  sunrise_duration_minutes: !input sunrise_duration_minutes
  sunset_offset_minutes: !input sunset_offset_minutes
  sunset_duration_minutes: !input sunset_duration_minutes
  day_brightness_pct: !input day_brightness_pct
  night_brightness_pct: !input night_brightness_pct
  weather_dimming_strength_pct: !input weather_dimming_strength_pct
  cloud_simulation_strength_pct: !input cloud_simulation_strength_pct
  minimum_weather_factor_pct: !input minimum_weather_factor_pct
  transition_seconds: !input transition_seconds
  dawn_rgbw: !input dawn_rgbw
  day_rgbw: !input day_rgbw
  dusk_rgbw: !input dusk_rgbw
  night_rgbw: !input night_rgbw
  status_text_entity: !input status_text_entity
  debug_notification: !input debug_notification

actions:
  - alias: Preisquelle bestimmen
    variables:
      active_price_entity: >-
        {% set tibber_entity = tibber_price_entity | string | trim %}
        {% set other_entity = price_entity_current | string | trim %}
        {% if tibber_entity != '' and is_number(states(tibber_entity)) %}
          {{ tibber_entity }}
        {% elif other_entity != '' and is_number(states(other_entity)) %}
          {{ other_entity }}
        {% else %}
          {{ '' }}
        {% endif %}
      price_source_mode: >-
        {% set entity_id = active_price_entity | string | trim %}
        {% if entity_id != '' %}
          entity
        {% else %}
          tibber
        {% endif %}
      price_source_label: >-
        {% set entity_id = active_price_entity | string | trim %}
        {% set tibber_entity = tibber_price_entity | string | trim %}
        {% if entity_id != '' and tibber_entity != '' and entity_id == tibber_entity %}
          tibber_entity
        {% else %}
          {{ price_source_mode | string | trim }}
        {% endif %}

  - alias: Dashboard-Regler und Wartung auswerten
    variables:
      effective_day_brightness_pct: >-
        {% set entity_id = day_brightness_control_entity | string | trim %}
        {% if entity_id != '' and is_number(states(entity_id)) %}
          {{ states(entity_id) | float(day_brightness_pct | float(90)) }}
        {% else %}
          {{ day_brightness_pct | float(90) }}
        {% endif %}
      effective_night_brightness_pct: >-
        {% set entity_id = night_brightness_control_entity | string | trim %}
        {% if entity_id != '' and is_number(states(entity_id)) %}
          {{ states(entity_id) | float(night_brightness_pct | float(2)) }}
        {% else %}
          {{ night_brightness_pct | float(2) }}
        {% endif %}
      effective_price_dimming_strength_pct: >-
        {% set entity_id = price_dimming_strength_control_entity | string | trim %}
        {% if entity_id != '' and is_number(states(entity_id)) %}
          {{ states(entity_id) | float(price_dimming_strength_pct | float(40)) }}
        {% else %}
          {{ price_dimming_strength_pct | float(40) }}
        {% endif %}
      effective_cloud_simulation_strength_pct: >-
        {% set entity_id = cloud_simulation_strength_control_entity | string | trim %}
        {% if entity_id != '' and is_number(states(entity_id)) %}
          {{ states(entity_id) | float(cloud_simulation_strength_pct | float(45)) }}
        {% else %}
          {{ cloud_simulation_strength_pct | float(45) }}
        {% endif %}
      maintenance_requested: >-
        {% set entity_id = maintenance_switch_entity | string | trim %}
        {{ entity_id != '' and is_state(entity_id, 'on') }}
      maintenance_started_ts: >-
        {% set entity_id = maintenance_switch_entity | string | trim %}
        {% set state_obj = expand(entity_id) | first %}
        {% if state_obj %}
          {{ as_timestamp(state_obj.last_changed) }}
        {% else %}
          0
        {% endif %}
      maintenance_elapsed_seconds: >-
        {% if ((maintenance_requested | string) | lower == 'true') %}
          {{ [0, (as_timestamp(now()) - (maintenance_started_ts | float(0)))] | max }}
        {% else %}
          0
        {% endif %}
      maintenance_expired: >-
        {{ ((maintenance_requested | string) | lower == 'true') and (maintenance_elapsed_seconds | float(0)) >= ((maintenance_timeout_minutes | int(30)) * 60) }}
      maintenance_mode_active: >-
        {{ ((maintenance_requested | string) | lower == 'true') and not ((maintenance_expired | string) | lower == 'true') }}
      maintenance_remaining_minutes: >-
        {% if ((maintenance_mode_active | string) | lower == 'true') %}
          {% set remaining = ((maintenance_timeout_minutes | int(30)) * 60) - (maintenance_elapsed_seconds | float(0)) %}
          {{ ([0, ((remaining / 60) | round(0, 'ceil'))] | max) | int(0) }}
        {% else %}
          0
        {% endif %}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ (maintenance_switch_entity | string | trim) != '' and ((maintenance_expired | string) | lower == 'true') }}"
        sequence:
          - action: homeassistant.turn_off
            target:
              entity_id: "{{ maintenance_switch_entity }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ (price_source_mode | string) != 'entity' }}"
        sequence:
          - alias: Preise von Tibber laden
            continue_on_error: true
            action: tibber.get_prices
            data:
              start: >-
                {{ now().replace(minute=0, second=0, microsecond=0).strftime('%Y-%m-%d %H:%M:%S') }}
              end: >-
                {{ (now().replace(minute=0, second=0, microsecond=0) + timedelta(hours=(price_lookahead_hours | int(24)))).strftime('%Y-%m-%d %H:%M:%S') }}
            response_variable: tibber_prices

  - alias: Zeitfenster aufbereiten
    variables:
      shifted_minutes: >-
        {% set total = now().hour * 60 + now().minute + (timezone_offset_minutes | int(0)) %}
        {{ ((total % 1440) + 1440) % 1440 }}
      current_ts: >-
        {{ as_timestamp(now()) }}
      shifted_clock: >-
        {% set total = now().hour * 60 + now().minute + (timezone_offset_minutes | int(0)) %}
        {% set wrapped = ((total % 1440) + 1440) % 1440 %}
        {% set hour = (wrapped // 60) | int(0) %}
        {% set minute = (wrapped % 60) | int(0) %}
        {{ '%02d:%02d' | format(hour, minute) }}
      sunrise_start_ts: >-
        {% set global_offset_seconds = (timezone_offset_minutes | int(0)) * 60 %}
        {% set sunrise_offset_seconds = (sunrise_offset_minutes | int(0)) * 60 %}
        {% set next_rising = as_datetime(state_attr(sun_entity, 'next_rising')) %}
        {% if next_rising %}
          {% set today = now().date() %}
          {% set sunrise_dt = next_rising if next_rising.date() == today else next_rising - timedelta(days=1) %}
          {{ as_timestamp(sunrise_dt) + global_offset_seconds + sunrise_offset_seconds }}
        {% else %}
          {{ as_timestamp(now()) + global_offset_seconds + sunrise_offset_seconds }}
        {% endif %}
      sunset_start_ts: >-
        {% set global_offset_seconds = (timezone_offset_minutes | int(0)) * 60 %}
        {% set sunset_offset_seconds = (sunset_offset_minutes | int(0)) * 60 %}
        {% set next_setting = as_datetime(state_attr(sun_entity, 'next_setting')) %}
        {% if next_setting %}
          {% set today = now().date() %}
          {% set sunset_dt = next_setting if next_setting.date() == today else next_setting - timedelta(days=1) %}
          {{ as_timestamp(sunset_dt) + global_offset_seconds + sunset_offset_seconds }}
        {% else %}
          {{ as_timestamp(now()) + global_offset_seconds + sunset_offset_seconds }}
        {% endif %}

  - alias: Sonnenzeiten formatieren
    variables:
      sunrise_start_clock: >-
        {{ as_datetime(sunrise_start_ts | float(0)).strftime('%H:%M') }}
      sunset_start_clock: >-
        {{ as_datetime(sunset_start_ts | float(0)).strftime('%H:%M') }}

  - alias: Phase bestimmen
    variables:
      phase_name: >-
        {% set current = current_ts | float(as_timestamp(now())) %}
        {% set sunrise_start = sunrise_start_ts | float(0) %}
        {% set sunrise_end = sunrise_start + ((sunrise_duration_minutes | int(120)) * 60) %}
        {% set sunset_start = sunset_start_ts | float(0) %}
        {% set sunset_end = sunset_start + ((sunset_duration_minutes | int(150)) * 60) %}
        {% if current >= sunrise_start and current < sunrise_end %}
          sunrise
        {% elif current >= sunrise_end and current < sunset_start %}
          day
        {% elif current >= sunset_start and current < sunset_end %}
          sunset
        {% else %}
          night
        {% endif %}

  - alias: Phasenfortschritt berechnen
    variables:
      phase_progress: >-
        {% set current = current_ts | float(as_timestamp(now())) %}
        {% set sunrise_start = sunrise_start_ts | float(0) %}
        {% set sunrise_length = ([sunrise_duration_minutes | int(120), 1] | max) * 60 %}
        {% set sunset_start = sunset_start_ts | float(0) %}
        {% set sunset_length = ([sunset_duration_minutes | int(150), 1] | max) * 60 %}
        {% if (phase_name | string) == 'sunrise' %}
          {{ ((current - sunrise_start) / sunrise_length) | float(0) }}
        {% elif (phase_name | string) == 'sunset' %}
          {{ ((current - sunset_start) / sunset_length) | float(0) }}
        {% elif (phase_name | string) == 'day' %}
          1
        {% else %}
          0
        {% endif %}

  - alias: Basishelligkeit berechnen
    variables:
      base_brightness_pct: >-
        {% set day_level = effective_day_brightness_pct | float(day_brightness_pct | float(90)) %}
        {% set night_level = effective_night_brightness_pct | float(night_brightness_pct | float(2)) %}
        {% set progress = phase_progress | float(0) %}
        {% if (phase_name | string) == 'sunrise' %}
          {{ (night_level + ((day_level - night_level) * progress)) | round(1) }}
        {% elif (phase_name | string) == 'sunset' %}
          {{ (day_level + ((night_level - day_level) * progress)) | round(1) }}
        {% elif (phase_name | string) == 'day' %}
          {{ day_level }}
        {% else %}
          {{ night_level }}
        {% endif %}

  - alias: Tibber-Home bestimmen
    variables:
      tibber_selected_home: >-
        {% set prices = tibber_prices.prices if tibber_prices is defined and tibber_prices.prices is defined else {} %}
        {% set keys = prices.keys() | list %}
        {% set requested = tibber_home_name | trim %}
        {% if requested != '' and requested in keys %}
          {{ requested }}
        {% elif keys | count > 0 %}
          {{ keys[0] }}
        {% else %}
          {{ '' }}
        {% endif %}

  - alias: Preisfenster bestimmen
    variables:
      current_price_min_attr: >-
        {% set entity_id = active_price_entity | string | trim %}
        {% if entity_id == '' %}
          none
        {% else %}
          {% set ns = namespace(value=none) %}
          {% for attribute_name in ['min_price', 'price_min', 'lowest_price', 'today_min', 'min'] %}
            {% set attribute_value = state_attr(entity_id, attribute_name) %}
            {% if ns.value is none and is_number(attribute_value) %}
