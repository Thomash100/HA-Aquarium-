          {% if slot_ts <= now_ts and now_ts < slot_end_ts and is_number(item.price) %}
            {% set ns.found = true %}
          {% endif %}
        {% endfor %}
        {{ ns.found }}
      price_data_valid: >-
        {% if (price_source_mode | string) == 'entity' %}
          {% set entity_id = active_price_entity | string | trim %}
          {% set has_current = entity_id != '' and is_number(states(entity_id)) %}
          {% set min_entity = price_entity_min | string | trim %}
          {% set max_entity = price_entity_max | string | trim %}
          {% set has_min = (min_entity != '' and is_number(states(min_entity))) or is_number(current_price_min_attr) %}
          {% set has_max = (max_entity != '' and is_number(states(max_entity))) or is_number(current_price_max_attr) %}
          {{ has_current and has_min and has_max }}
        {% else %}
          {% set prices = tibber_prices.prices if tibber_prices is defined and tibber_prices.prices is defined else {} %}
          {% set home_prices = prices[tibber_selected_home] if tibber_selected_home in prices else [] %}
          {% set now_ts = as_timestamp(now()) %}
          {% set default_slot_seconds = tibber_slot_seconds | int(3600) %}
          {% set ns = namespace(found=false) %}
          {% for item in home_prices %}
            {% set slot_ts = as_timestamp(as_datetime(item.start_time)) %}
            {% if loop.index < (home_prices | count) %}
              {% set next_slot_ts = as_timestamp(as_datetime(home_prices[loop.index].start_time)) %}
            {% else %}
              {% set next_slot_ts = slot_ts + default_slot_seconds %}
            {% endif %}
            {% set slot_end_ts = next_slot_ts if next_slot_ts > slot_ts else slot_ts + default_slot_seconds %}
            {% if slot_ts <= now_ts and now_ts < slot_end_ts and is_number(item.price) %}
              {% set ns.found = true %}
            {% endif %}
          {% endfor %}
          {{ ns.found }}
        {% endif %}
      current_price: >-
        {% if (price_source_mode | string) == 'entity' %}
          {% set entity_id = active_price_entity | string | trim %}
          {{ states(entity_id) | float(0) }}
        {% else %}
          {% set prices = tibber_prices.prices if tibber_prices is defined and tibber_prices.prices is defined else {} %}
          {% set home_prices = prices[tibber_selected_home] if tibber_selected_home in prices else [] %}
          {% set now_ts = as_timestamp(now()) %}
          {% set default_slot_seconds = tibber_slot_seconds | int(3600) %}
          {% set ns = namespace(value=0) %}
          {% for item in home_prices %}
            {% set slot_ts = as_timestamp(as_datetime(item.start_time)) %}
            {% if loop.index < (home_prices | count) %}
              {% set next_slot_ts = as_timestamp(as_datetime(home_prices[loop.index].start_time)) %}
            {% else %}
              {% set next_slot_ts = slot_ts + default_slot_seconds %}
            {% endif %}
            {% set slot_end_ts = next_slot_ts if next_slot_ts > slot_ts else slot_ts + default_slot_seconds %}
            {% if slot_ts <= now_ts and now_ts < slot_end_ts and is_number(item.price) %}
              {% set ns.value = item.price | float(0) %}
            {% endif %}
          {% endfor %}
          {{ ns.value }}
        {% endif %}
      min_price: >-
        {% if (price_source_mode | string) == 'entity' %}
          {% set min_entity = price_entity_min | string | trim %}
          {% set current_entity = active_price_entity | string | trim %}
          {% if min_entity != '' and is_number(states(min_entity)) %}
            {{ states(min_entity) | float(0) }}
          {% elif is_number(current_price_min_attr) %}
            {{ current_price_min_attr | float(0) }}
          {% elif current_entity != '' and is_number(states(current_entity)) %}
            {{ states(current_entity) | float(0) }}
          {% else %}
            0
          {% endif %}
        {% else %}
          {% set prices = tibber_prices.prices if tibber_prices is defined and tibber_prices.prices is defined else {} %}
          {% set home_prices = prices[tibber_selected_home] if tibber_selected_home in prices else [] %}
          {% set now_ts = as_timestamp(now()) %}
          {% set default_slot_seconds = tibber_slot_seconds | int(3600) %}
          {% set ns = namespace(values=[]) %}
          {% for item in home_prices %}
            {% set slot_ts = as_timestamp(as_datetime(item.start_time)) %}
            {% if loop.index < (home_prices | count) %}
              {% set next_slot_ts = as_timestamp(as_datetime(home_prices[loop.index].start_time)) %}
            {% else %}
              {% set next_slot_ts = slot_ts + default_slot_seconds %}
            {% endif %}
            {% set slot_end_ts = next_slot_ts if next_slot_ts > slot_ts else slot_ts + default_slot_seconds %}
            {% if slot_end_ts > now_ts and is_number(item.price) %}
              {% set ns.values = ns.values + [item.price | float(0)] %}
            {% endif %}
          {% endfor %}
          {% if ns.values | count > 0 %}
            {{ ns.values | min }}
          {% else %}
            0
          {% endif %}
        {% endif %}
      max_price: >-
        {% if (price_source_mode | string) == 'entity' %}
          {% set max_entity = price_entity_max | string | trim %}
          {% set current_entity = active_price_entity | string | trim %}
          {% if max_entity != '' and is_number(states(max_entity)) %}
            {{ states(max_entity) | float(0) }}
          {% elif is_number(current_price_max_attr) %}
            {{ current_price_max_attr | float(0) }}
          {% elif current_entity != '' and is_number(states(current_entity)) %}
            {{ states(current_entity) | float(0) }}
          {% else %}
            0
          {% endif %}
        {% else %}
          {% set prices = tibber_prices.prices if tibber_prices is defined and tibber_prices.prices is defined else {} %}
          {% set home_prices = prices[tibber_selected_home] if tibber_selected_home in prices else [] %}
          {% set now_ts = as_timestamp(now()) %}
          {% set default_slot_seconds = tibber_slot_seconds | int(3600) %}
          {% set ns = namespace(values=[]) %}
          {% for item in home_prices %}
            {% set slot_ts = as_timestamp(as_datetime(item.start_time)) %}
            {% if loop.index < (home_prices | count) %}
              {% set next_slot_ts = as_timestamp(as_datetime(home_prices[loop.index].start_time)) %}
            {% else %}
              {% set next_slot_ts = slot_ts + default_slot_seconds %}
            {% endif %}
            {% set slot_end_ts = next_slot_ts if next_slot_ts > slot_ts else slot_ts + default_slot_seconds %}
            {% if slot_end_ts > now_ts and is_number(item.price) %}
              {% set ns.values = ns.values + [item.price | float(0)] %}
            {% endif %}
          {% endfor %}
          {% if ns.values | count > 0 %}
            {{ ns.values | max }}
          {% else %}
            0
          {% endif %}
        {% endif %}
      current_slot_is_cheap: >-
        {% if (price_source_mode | string) == 'entity' %}
          {% set cheap_entity = price_entity_cheap | string | trim %}
          {% if cheap_entity != '' %}
            {{ is_state(cheap_entity, 'on') }}
          {% else %}
            {% set current = current_price | float(0) %}
            {% set lowest = min_price | float(current) %}
            {% set highest = max_price | float(current) %}
            {% set spread = highest - lowest %}
            {% set cheap_share = (cheapest_hours_count | float(4)) / ([price_lookahead_hours | float(24), 1] | max) %}
            {% set threshold = lowest + (spread * cheap_share) %}
            {{ spread > 0 and current <= threshold }}
          {% endif %}
        {% else %}
          {% set prices = tibber_prices.prices if tibber_prices is defined and tibber_prices.prices is defined else {} %}
          {% set home_prices = prices[tibber_selected_home] if tibber_selected_home in prices else [] %}
          {% set now_ts = as_timestamp(now()) %}
          {% set default_slot_seconds = tibber_slot_seconds | int(3600) %}
          {% set slot_count = tibber_cheapest_slot_count | int(1) %}
          {% set ns = namespace(relevant=[], current_start='') %}
          {% for item in home_prices %}
            {% set slot_ts = as_timestamp(as_datetime(item.start_time)) %}
            {% if loop.index < (home_prices | count) %}
              {% set next_slot_ts = as_timestamp(as_datetime(home_prices[loop.index].start_time)) %}
            {% else %}
              {% set next_slot_ts = slot_ts + default_slot_seconds %}
            {% endif %}
            {% set slot_end_ts = next_slot_ts if next_slot_ts > slot_ts else slot_ts + default_slot_seconds %}
            {% if slot_end_ts > now_ts and is_number(item.price) %}
              {% set ns.relevant = ns.relevant + [item] %}
            {% endif %}
            {% if slot_ts <= now_ts and now_ts < slot_end_ts %}
              {% set ns.current_start = item.start_time %}
            {% endif %}
          {% endfor %}
          {% set cheapest = (ns.relevant | sort(attribute='price'))[:slot_count] %}
          {{ ns.current_start != '' and (cheapest | selectattr('start_time', 'equalto', ns.current_start) | list | count > 0) }}
        {% endif %}

  - alias: Preisfaktor berechnen
    variables:
      price_factor: >-
        {% set min_factor = (minimum_price_factor_pct | float(55)) / 100 %}
        {% if not ((price_data_valid | string) | lower == 'true') %}
          1
        {% else %}
          {% set current = current_price | float(0) %}
          {% set lowest = min_price | float(0) %}
          {% set highest = max_price | float(0) %}
          {% set spread = highest - lowest %}
          {% set dim_strength = (effective_price_dimming_strength_pct | float(price_dimming_strength_pct | float(40))) / 100 %}
          {% set cheap_bonus = ((cheap_hours_bonus_pct | float(10)) / 100) if ((current_slot_is_cheap | string) | lower == 'true') else 0 %}
          {% if spread <= 0 %}
            {{ [1, [1 + cheap_bonus, min_factor] | max] | min }}
          {% else %}
            {% set position = (current - lowest) / spread %}
            {% set raw_factor = 1 - (position * dim_strength) + cheap_bonus %}
            {{ [1, [raw_factor, min_factor] | max] | min }}
          {% endif %}
        {% endif %}

  - alias: Bewoelkung bestimmen
    variables:
      weather_state_name: >-
        {{ states(weather_entity) | lower }}
      cloudiness_factor: >-
        {% set coverage = state_attr(weather_entity, 'cloud_coverage') %}
        {% if is_number(coverage) %}
          {{ ([coverage | float(0), 100] | min) / 100 }}
        {% else %}
          {% set state_name = states(weather_entity) | lower %}
          {% if state_name in ['sunny', 'clear-night'] %}
            0
          {% elif state_name in ['partlycloudy', 'windy', 'windy-variant'] %}
            0.35
          {% elif state_name in ['cloudy', 'fog', 'hail'] %}
            0.65
          {% elif state_name in ['rainy', 'pouring', 'snowy', 'snowy-rainy', 'lightning', 'lightning-rainy'] %}
            0.85
          {% else %}
            0.2
          {% endif %}
        {% endif %}

  - alias: Wetterfaktoren berechnen
    variables:
      weather_factor: >-
        {% set minimum_factor = (minimum_weather_factor_pct | float(50)) / 100 %}
        {% if (phase_name | string) == 'night' %}
          1
        {% else %}
          {% set dim_strength = (weather_dimming_strength_pct | float(20)) / 100 %}
          {% set cloudiness = cloudiness_factor | float(0) %}
          {% set raw_factor = 1 - (cloudiness * dim_strength) %}
          {{ [1, [raw_factor, minimum_factor] | max] | min }}
        {% endif %}
      cloud_pulse_factor: >-
        {% if (phase_name | string) == 'night' %}
          1
        {% else %}
          {% set cloudiness = cloudiness_factor | float(0) %}
          {% set pulse_strength = (effective_cloud_simulation_strength_pct | float(cloud_simulation_strength_pct | float(45))) / 100 %}
          {% set slot = ((shifted_minutes | int(0)) // 5) % 12 %}
          {% set dip = 0 %}
          {% if cloudiness >= 0.2 and slot in [2, 8] %}
            {% set dip = 0.08 + (cloudiness * 0.08) %}
          {% endif %}
          {% if cloudiness >= 0.5 and slot in [4, 9] %}
            {% set dip = [dip, 0.12 + (cloudiness * 0.10)] | max %}
          {% endif %}
          {% if cloudiness >= 0.8 and slot == 6 %}
            {% set dip = [dip, 0.18 + (cloudiness * 0.12)] | max %}
          {% endif %}
          {{ [1, [1 - (dip * pulse_strength), 0.4] | max] | min }}
        {% endif %}

  - alias: RGBW-Zielfarbe berechnen
    variables:
      color_from_csv: >-
        {% if (phase_name | string) == 'sunrise' %}
          {{ dawn_rgbw | string | replace(';', ',') }}
        {% elif (phase_name | string) == 'sunset' %}
          {{ day_rgbw | string | replace(';', ',') }}
        {% elif (phase_name | string) == 'night' %}
          {{ night_rgbw | string | replace(';', ',') }}
        {% else %}
          {{ day_rgbw | string | replace(';', ',') }}
        {% endif %}
      color_to_csv: >-
        {% if (phase_name | string) == 'sunrise' %}
          {{ day_rgbw | string | replace(';', ',') }}
        {% elif (phase_name | string) == 'sunset' %}
          {{ dusk_rgbw | string | replace(';', ',') }}
        {% elif (phase_name | string) == 'night' %}
          {{ night_rgbw | string | replace(';', ',') }}
        {% else %}
          {{ day_rgbw | string | replace(';', ',') }}
        {% endif %}

  - alias: RGBW-Kanaele normalisieren
    variables:
      color_from_parts: >-
        {% if color_from_csv is string %}
          {{ (color_from_csv | replace(';', ',') | replace(' ', '')).split(',') }}
        {% else %}
          {{ color_from_csv | list }}
        {% endif %}
      color_to_parts: >-
        {% if color_to_csv is string %}
          {{ (color_to_csv | replace(';', ',') | replace(' ', '')).split(',') }}
        {% else %}
          {{ color_to_csv | list }}
        {% endif %}

  - alias: Zielkanaele berechnen
    variables:
      target_r: >-
        {% set progress = phase_progress | float(0) %}
        {% set start = color_from_parts[0] | int(0) %}
        {% set finish = color_to_parts[0] | int(start) %}
        {{ (start + ((finish - start) * progress)) | round(0) | int }}
      target_g: >-
        {% set progress = phase_progress | float(0) %}
        {% set start = color_from_parts[1] | int(0) %}
        {% set finish = color_to_parts[1] | int(start) %}
        {{ (start + ((finish - start) * progress)) | round(0) | int }}
      target_b: >-
        {% set progress = phase_progress | float(0) %}
        {% set start = color_from_parts[2] | int(0) %}
        {% set finish = color_to_parts[2] | int(start) %}
        {{ (start + ((finish - start) * progress)) | round(0) | int }}
      target_w: >-
        {% set progress = phase_progress | float(0) %}
        {% set start = color_from_parts[3] | int(0) %}
        {% set finish = color_to_parts[3] | int(start) %}
        {{ (start + ((finish - start) * progress)) | round(0) | int }}

  - alias: Zielhelligkeit berechnen
    variables:
      target_brightness_pct: >-
        {% set base_level = base_brightness_pct | float(0) %}
        {% if (phase_name | string) == 'night' %}
          {{ [100, [base_level, 0] | max] | min | round(0) }}
        {% else %}
          {% set raw_target = base_level * (price_factor | float(1)) * (weather_factor | float(1)) * (cloud_pulse_factor | float(1)) %}
          {{ [100, [raw_target, 0] | max] | min | round(0) }}
        {% endif %}

  - alias: Weisshelligkeit berechnen
    variables:
      target_white_brightness_pct: >-
        {% set brightness = target_brightness_pct | float(0) %}
        {% set white_share = (target_w | float(0)) / 255 %}
        {{ [100, [(brightness * white_share), 0] | max] | min | round(0) }}

  - alias: Wartungsmodus anwenden
    variables:
      applied_phase_name: >-
        {% if ((maintenance_mode_active | string) | lower == 'true') %}
          maintenance
        {% else %}
          {{ phase_name | string | trim }}
        {% endif %}
      applied_target_r: >-
        {% if ((maintenance_mode_active | string) | lower == 'true') %}
          255
        {% else %}
          {{ target_r | int(0) }}
        {% endif %}
      applied_target_g: >-
        {% if ((maintenance_mode_active | string) | lower == 'true') %}
          255
        {% else %}
          {{ target_g | int(0) }}
        {% endif %}
      applied_target_b: >-
        {% if ((maintenance_mode_active | string) | lower == 'true') %}
          255
        {% else %}
          {{ target_b | int(0) }}
        {% endif %}
      applied_target_w: >-
        {% if ((maintenance_mode_active | string) | lower == 'true') %}
          255
        {% else %}
          {{ target_w | int(0) }}
        {% endif %}
      applied_target_brightness_pct: >-
        {% if ((maintenance_mode_active | string) | lower == 'true') %}
          100
        {% else %}
          {{ target_brightness_pct | int(0) }}
        {% endif %}
      applied_target_white_brightness_pct: >-
        {% if ((maintenance_mode_active | string) | lower == 'true') %}
          100
        {% else %}
          {{ target_white_brightness_pct | int(0) }}
        {% endif %}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ (applied_target_brightness_pct | float(0)) <= 0 }}"
        sequence:
          - action: light.turn_off
            target:
              entity_id: !input rgbw_lights
            data:
              transition: !input transition_seconds
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ (white_lights | count) > 0 }}"
                sequence:
                  - action: light.turn_off
                    target:
                      entity_id: !input white_lights
                    data:
                      transition: !input transition_seconds

    default:
      - action: light.turn_on
        target:
          entity_id: !input rgbw_lights
        data:
          brightness_pct: "{{ applied_target_brightness_pct | int(0) }}"
          transition: !input transition_seconds
          rgbw_color:
            - "{{ applied_target_r | int(0) }}"
            - "{{ applied_target_g | int(0) }}"
            - "{{ applied_target_b | int(0) }}"
            - "{{ applied_target_w | int(0) }}"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ (white_lights | count) > 0 and (applied_target_white_brightness_pct | float(0)) > 0 }}"
            sequence:
              - action: light.turn_on
                target:
                  entity_id: !input white_lights
                data:
                  brightness_pct: "{{ applied_target_white_brightness_pct | int(0) }}"
                  transition: !input transition_seconds
          - conditions:
              - condition: template
                value_template: "{{ (white_lights | count) > 0 and (applied_target_white_brightness_pct | float(0)) <= 0 }}"
            sequence:
              - action: light.turn_off
                target:
                  entity_id: !input white_lights
                data:
                  transition: !input transition_seconds

